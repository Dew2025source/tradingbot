<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - ParkFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <script src="./shared.js"></script>
  <script>bootNav("signup")</script>

  <main class="auth-wrap page">
    <section class="auth-card">
      <h1>Create account</h1>
      <p class="muted">Signup and keep your saved parking spots tied to your account.</p>

      <form id="signupForm" class="form-grid">
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name" required />
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create password" required />
        </div>

        <button type="submit" class="primary-btn">Signup</button>
      </form>

      <div id="msg" class="msg"></div>

      <div class="form-footer">
        <span class="muted">Already have an account?</span>
        <a class="nav-link active" href="./login.html">Login</a>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const msg = document.getElementById("msg");
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${API}/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(msg, data.error || "Signup failed", "err");
          return;
        }

        setMessage(msg, "Signup successful. Redirecting to login...", "ok");
        setTimeout(() => {
          window.location.href = "./login.html";
        }, 900);
      } catch (error) {
        setMessage(msg, "Backend is not running on http://localhost:5000", "err");
      }
    });
  </script>
</body>
</html>
